version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: pfcs-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: pfcs-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
