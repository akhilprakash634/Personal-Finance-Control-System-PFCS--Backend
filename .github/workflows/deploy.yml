name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: 43.205.229.25
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "."
          target: "~/Personal-Finance-Control-System-PFCS/backend"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 43.205.229.25
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd ~/Personal-Finance-Control-System-PFCS/backend
            # Copy secrets from the server's secret folder
            cp ~/secret/backend/.env .env
            # Try docker compose (v2) first, then fallback to docker-compose
            (sudo docker compose up --build -d backend) || (sudo docker-compose up --build -d backend)
